name: verify-linux

on:
  push:
    branches: [linux]
  pull_request:
    branches: [linux]

jobs:
  verify-linux-port:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: System packages (tkinter)
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install -r linux_port/requirements.txt
          python -m pip install ruff

      - name: Prepare app if missing
        run: |
          if [ ! -f linux_port/app/main.py ]; then
            python linux_port/prepare.py
          fi

      - name: Verify Linux copy
        run: python linux_port/verify_linux.py --no-launch

      - name: Unit tests
        run: python -m unittest discover -s tests -v
