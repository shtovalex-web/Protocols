name: build-linux-dist

on:
  push:
    branches: [linux]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pyinstaller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: System packages
        run: |
          sudo apt-get update
          # python3-tk — для verify при сборке; binutils (objdump) — для PyInstaller
          sudo apt-get install -y python3-tk binutils

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r linux_port/requirements.txt
          python -m pip install -r linux_port/requirements-build.txt

      - name: Ensure linux_port/app
        run: |
          if [ ! -f linux_port/app/main.py ]; then
            python linux_port/prepare.py
          fi

      - name: Build PyInstaller binary
        run: python linux_port/build_linux.py --no-verify

      - name: Pack distributable zip
        run: |
          DIST="linux_port/ProtocolOHT_linux_dist"
          test -f "$DIST/ProtocolOOT"
          (cd "$DIST" && zip -r ../ProtocolOHT_linux_dist.zip .)
          ls -la linux_port/ProtocolOHT_linux_dist.zip

      - name: Upload distributable
        uses: actions/upload-artifact@v4
        with:
          name: ProtocolOHT_linux_dist
          path: linux_port/ProtocolOHT_linux_dist.zip
          if-no-files-found: error
          retention-days: 90
